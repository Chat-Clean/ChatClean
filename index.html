    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "O que e um CRM para WhatsApp?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Um CRM para WhatsApp e uma plataforma que conecta o WhatsApp Business ao seu processo comercial: registra cada conversa, organiza leads em um funil de vendas (Kanban), permite que varios atendentes usem o mesmo numero e automatiza mensagens. Na ChatClean, o CRM e integrado a API Oficial do WhatsApp e ainda centraliza Instagram, Facebook e Telegram no mesmo painel."
          }
        },
        {
          "@type": "Question",
          "name": "O que e a API Oficial do WhatsApp e por que ela importa?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A API Oficial do WhatsApp Business (Cloud API) e a versao homologada pela Meta para empresas. Permite ter um unico numero com varios atendentes, envio de templates aprovados, integracao com sistemas e zero risco de banimento. A ChatClean e integrada nativamente a API Oficial e cuida de toda a configuracao com voce."
          }
        },
        {
          "@type": "Question",
          "name": "Quanto custa a API Oficial do WhatsApp?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A Meta cobra por conversa iniciada, com valores que variam por categoria (utilidade, marketing, autenticacao, servico) e pelo pais do destinatario. No Brasil, conversas de utilidade custam aproximadamente R$ 0,045 e de marketing cerca de R$ 0,35 por sessao. A ChatClean inclui essa orientacao na proposta personalizada e ajuda a otimizar o uso de templates para reduzir custos."
          }
        },
        {
          "@type": "Question",
          "name": "Como ter varios atendentes em um unico numero de WhatsApp?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Com a API Oficial e a ChatClean, sua empresa tem um unico numero de WhatsApp com login individual para cada atendente, filas, departamentos, transferencia de conversa, historico centralizado e relatorios por colaborador, sem precisar de varios celulares ou chips."
          }
        },
        {
          "@type": "Question",
          "name": "Qual a diferenca entre WhatsApp Business e API Oficial?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "O WhatsApp Business comum (aplicativo) e gratuito e funciona para autonomos e microempresas, mas so permite ate 4 dispositivos no mesmo numero. A API Oficial e a solucao para empresas que precisam de multiatendimento real, automacao com chatbot, integracao com CRM e envio de campanhas em escala, sem risco de bloqueio."
          }
        },
        {
          "@type": "Question",
          "name": "Como integrar o WhatsApp ao meu CRM?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Na ChatClean, a integracao e nativa: voce nao precisa instalar plugins ou contratar fornecedores extras. Nossa equipe ativa a API Oficial do WhatsApp para o seu numero, configura templates, importa contatos e treina o time. Geralmente o onboarding e concluido em poucos dias uteis."
          }
        }
      ]
    }
